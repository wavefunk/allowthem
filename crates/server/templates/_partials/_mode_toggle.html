{# _mode_toggle.html — button that mode-toggle.js wires up.
   Hidden when the tenant forces a mode (<html data-mode-locked>).
#}
<button type="button"
        class="wf-btn ghost wf-mode-toggle"
        data-mode-toggle
        aria-label="toggle color mode">
  <span class="wf-kbd">m</span>
</button>
<style>
  html[data-mode-locked] .wf-mode-toggle { display: none; }
</style>
