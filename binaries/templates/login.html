{% extends "base.html" %}

{% block title %}Log in — allowthem{% endblock %}

{% block body %}
<div class="flex min-h-screen items-center justify-center px-4">
    <div class="w-full max-w-sm">
        <h1 class="text-2xl font-bold text-center text-gray-900 mb-8">Log in</h1>

        {% if error %}
        <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded mb-6" role="alert">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" action="/login" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}

            <div>
                <label for="identifier" class="block text-sm font-medium text-gray-700 mb-1">
                    Email or username
                </label>
                <input type="text" id="identifier" name="identifier"
                       value="{{ identifier }}" autocomplete="username"
                       required
                       class="w-full rounded border border-gray-300 px-3 py-2
                              focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                    Password
                </label>
                <input type="password" id="password" name="password"
                       autocomplete="current-password"
                       required
                       class="w-full rounded border border-gray-300 px-3 py-2
                              focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>

            <button type="submit"
                    class="w-full rounded bg-blue-600 px-4 py-2 text-white font-medium
                           hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                Log in
            </button>
        </form>
    </div>
</div>
{% endblock %}
