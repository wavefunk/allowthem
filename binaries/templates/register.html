{% extends "base.html" %}

{% block title %}Register — allowthem{% endblock %}

{% block body %}
<div class="flex min-h-screen items-center justify-center px-4">
    <div class="w-full max-w-md">
        <h1 class="text-2xl font-bold text-center text-gray-900 mb-8">
            Create an account
        </h1>

        {% if error %}
        <div class="mb-4 rounded bg-red-50 border border-red-200 p-3 text-sm text-red-700">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" action="/register" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <div>
                <label for="email" class="block text-sm font-medium text-gray-700">
                    Email
                </label>
                <input type="email" id="email" name="email"
                       value="{{ email }}"
                       required autocomplete="email"
                       class="mt-1 block w-full rounded border border-gray-300 px-3 py-2
                              text-gray-900 focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
            </div>

            <div>
                <label for="username" class="block text-sm font-medium text-gray-700">
                    Username <span class="text-gray-400">(optional)</span>
                </label>
                <input type="text" id="username" name="username"
                       value="{{ username }}"
                       autocomplete="username"
                       class="mt-1 block w-full rounded border border-gray-300 px-3 py-2
                              text-gray-900 focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">
                    Password
                </label>
                <input type="password" id="password" name="password"
                       required minlength="8" autocomplete="new-password"
                       class="mt-1 block w-full rounded border border-gray-300 px-3 py-2
                              text-gray-900 focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
            </div>

            <div>
                <label for="password_confirm" class="block text-sm font-medium text-gray-700">
                    Confirm password
                </label>
                <input type="password" id="password_confirm" name="password_confirm"
                       required minlength="8" autocomplete="new-password"
                       class="mt-1 block w-full rounded border border-gray-300 px-3 py-2
                              text-gray-900 focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
            </div>

            <button type="submit"
                    class="w-full rounded bg-blue-600 px-4 py-2 text-white font-medium
                           hover:bg-blue-700 focus:outline-none focus:ring-2
                           focus:ring-blue-500 focus:ring-offset-2">
                Register
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-gray-600">
            Already have an account?
            <a href="/login" class="text-blue-600 hover:text-blue-500">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
